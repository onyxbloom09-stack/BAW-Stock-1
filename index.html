<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Privé - B&W</title>
    <link rel="icon" type="images/png" href="logobw.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root { 
        --bg: #050505;
        --card: #0f0f0f;
        --accent: #ffcc33;
        --gold-grad: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        --steel: #d4af37;
        --border: 1px solid #3d331a; 
    }

    body { 
        background-color: var(--bg); 
        color: #ffffff; 
        font-family: 'Outfit'; 
        padding: 20px; 
        margin: 0; 
        background-image: radial-gradient(circle at 50% -20%, rgba(191, 149, 63, 0.15) 0%, transparent 50%); 
        background-attachment: fixed;
        min-height: 100vh; 
    }

    /* Effet de fines paillettes sur l'ensemble du site */
    body::after {
        content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
        opacity: 0.2; pointer-events: none; z-index: 1;
    }
    
    .header-tools { 
        position: sticky; top: 0; background: rgba(5, 5, 5, 0.9); 
        backdrop-filter: blur(12px); z-index: 10; padding: 15px; 
        text-align: center; border-bottom: 2px solid transparent;
        border-image: var(--gold-grad) 1;
    }

    .logo-header {
        width: 180px; margin-bottom: 10px;
        filter: drop-shadow(0 0 15px rgba(191, 149, 63, 0.4));
    }

    .search-bar { 
        width: 100%; padding: 12px; background: #111; border: 1px solid #3d331a; 
        border-radius: 8px; color: white; box-sizing: border-box; transition: 0.3s;
    }
    .search-bar:focus { border-color: var(--accent); outline: none; }

    .grid { 
        display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
        gap: 20px; padding-bottom: 150px; margin-top: 30px; position: relative; z-index: 2;
    }

    .card { 
        background: var(--card); border: 1px solid #2a2a2a; border-radius: 12px; 
        padding: 15px; text-align: center; transition: 0.4s ease;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8); position: relative; overflow: hidden;
    }
    .card:hover { border-color: #bf953f; transform: translateY(-5px); }
    
    .item-img { width: 75px; height: 75px; object-fit: contain; margin-bottom: 10px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
    
    .item-stock { 
        background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        font-weight: bold; font-size: 2rem; display: block; margin: 5px 0; 
    }

    .fab { 
        position: fixed; bottom: 95px; right: 25px; width: 60px; height: 60px; 
        background: var(--gold-grad); color: #000; border: none; 
        border-radius: 50%; font-size: 2rem; cursor: pointer; z-index: 2001; 
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 5px 20px rgba(191, 149, 63, 0.4); transition: 0.3s;
    }

    .modal { 
        display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
        background: rgba(0,0,0,0.95); backdrop-filter: blur(8px);
        justify-content: center; align-items: center; z-index: 3000; 
    }
    .modal-content { 
        background: #0a0a0a; padding: 30px; border: 2px solid transparent; 
        border-image: var(--gold-grad) 1; width: 90%; max-width: 360px; text-align: center;
    }

    .admin-bar { 
        position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; 
        border-top: 1px solid #3d331a; padding: 18px 0; 
        display: flex; justify-content: center; gap: 15px; z-index: 2000; 
    }
    
    .btn-save { 
        background: var(--gold-grad); color: #000; border: none; padding: 12px 30px; 
        border-radius: 6px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s;
    }

    .empty-msg { text-align: center; grid-column: 1 / -1; color: #555; margin-top: 50px; font-style: italic; }
</style>
</head>
<body>

    <div class="header-tools">
        <img src="logobw.jpg" class="logo-header" alt="Black And White">
        <input type="text" class="search-bar" placeholder="🔍 Rechercher dans le coffre Black And White..." onkeyup="filter(this.value)">
    </div>

    <div id="inventory" class="grid"></div>

    <button class="fab" onclick="toggleModal(true)">+</button>

    <div id="modalAdd" class="modal">
        <div class="modal-content">
            <h2 style="background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top:0;">NOUVEL ITEM</h2>
            <input type="text" id="addByWho" class="modal-input" placeholder="Votre Nom">
            <input type="text" id="newName" class="modal-input" placeholder="Nom de l'objet">
            <input type="number" id="newQty" class="modal-input" placeholder="Quantité" value="0">
            <input type="text" id="newImg" class="modal-input" placeholder="Image (ex: item.png)">
            <button id="confirmAddBtn" class="btn-save" style="width:100%; margin-top:10px;" onclick="addNewItem()">FORGER L'ITEM</button>
            <button style="background:none; border:none; color:#555; width:100%; margin-top:15px; cursor:pointer;" onclick="toggleModal(false)">ANNULER</button>
        </div>
    </div>

    <div class="admin-bar">
        <input type="text" id="userName" placeholder="Nom du joueur" style="padding:10px; border-radius:6px; background:#111; color:white; border:1px solid #3d331a; outline:none;">
        <button id="saveBtn" class="btn-save" onclick="submitChanges()">SCELLER LES MODIFS</button>
    </div>

<script src="config.js"></script>
<script>
    const API_URL = window.CONFIG.API_URL;
    const DISCORD_WEBHOOK = window.CONFIG.DISCORD_WEBHOOK;
    
    let originalData = [];
    let changes = {}; 

    async function load() {
        try {
            const resp = await fetch(API_URL);
            const data = await resp.json();
            originalData = Array.isArray(data) ? data : [];
            originalData.sort((a, b) => a.nom.localeCompare(b.nom, 'fr'));
            render();
        } catch (e) { console.error("Erreur:", e); render(); }
    }

    function render() {
        const container = document.getElementById('inventory');
        if (originalData.length === 0) {
            container.innerHTML = '<div class="empty-msg">Le coffre BAW est vide.</div>';
            return;
        }

        container.innerHTML = originalData.map(item => {
            const imgSrc = (item.image && item.image.includes('http')) ? item.image : `images/${item.image}`;
            return `
            <div class="card" id="card-${item.id}" data-name="${item.nom.toLowerCase()}">
                <div style="position:absolute; top:8px; right:8px; display:flex; gap:8px; z-index:5;">
                    <button onclick="editItem(${item.id})" style="background:none; border:none; color:#bf953f; cursor:pointer;">✏️</button>
                    <button onclick="deleteItem(${item.id})" style="background:none; border:none; color:#ff4444; cursor:pointer;">✕</button>
                </div>
                <img src="${imgSrc}" class="item-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/702/702455.png'">
                <span style="display:block; font-size:0.75rem; font-weight:bold; color:var(--steel); text-transform:uppercase;">${item.nom}</span>
                <span class="item-stock" id="display-${item.id}">${item.stock}</span>
                <input type="number" class="input-qty" style="width:75%; background:#000; color:#fff; border:1px solid #3d331a; text-align:center; padding:6px; border-radius:4px;" 
                        placeholder="+ / -" oninput="trackChange(${item.id}, this.value, ${item.stock})">
            </div>`;
        }).join('');
    }

    function trackChange(id, value, oldStock) {
        const card = document.getElementById(`card-${id}`);
        if (value !== "" && value !== "0") {
            changes[id] = oldStock + parseInt(value);
            card.style.borderColor = "#bf953f";
        } else {
            delete changes[id];
            card.style.borderColor = "#2a2a2a";
        }
    }

    async function addNewItem() {
        const creator = document.getElementById('addByWho').value.trim();
        const nom = document.getElementById('newName').value.trim();
        const stock = parseInt(document.getElementById('newQty').value) || 0;
        const img = document.getElementById('newImg').value.trim();
        if(!creator || !nom) return alert("Nom artisan et item requis !");
        
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'add', nom: nom, stock: stock, image: img }) });
        await sendDiscord(`✨ **NOUVEAU TRESOR [BAW]**\n👤 Artisan : ${creator}\n📦 Item : ${nom}\n💰 Quantité : ${stock}`);
        setTimeout(() => location.reload(), 1000);
    }

    async function submitChanges() {
        const user = document.getElementById('userName').value.trim();
        if (!user || Object.keys(changes).length === 0) return alert("Nom manquant ou aucune modif.");
        
        let report = "";
        const updates = Object.keys(changes).map(id => {
            const item = originalData.find(i => i.id == id);
            report += `\n- **${item.nom}** : ${item.stock} ➔ ${changes[id]}`;
            return { id: parseInt(id), nouveauStock: changes[id] };
        });

        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'bulk_update', updates: updates }) });
        await sendDiscord(`📀 **MOUVEMENT DE STOCK [BAW]**\n👤 Responsable : ${user}${report}`);
        setTimeout(() => location.reload(), 1000);
    }

    async function deleteItem(id) {
        const user = document.getElementById('userName').value.trim();
        if (!user) return alert("Indiquez votre nom en bas !");
        const item = originalData.find(i => i.id === id);
        if (confirm(`Supprimer "${item.nom}" ?`)) {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', id: id }) });
            await sendDiscord(`🔥 **ITEM DETRUIT [BAW]**\n👤 Responsable : ${user}\n🗑️ Item : ${item.nom}`);
            setTimeout(() => location.reload(), 500);
        }
    }

    async function editItem(id) {
        const user = document.getElementById('userName').value.trim();
        if (!user) return alert("Indiquez votre nom en bas !");
        const item = originalData.find(i => i.id === id);
        const nNom = prompt("Nouveau nom :", item.nom);
        const nImg = prompt("Nouvelle image :", item.image);
        if (nNom && (nNom !== item.nom || nImg !== item.image)) {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'update_info', id: id, nom: nNom, image: nImg }) });
            await sendDiscord(`✏️ **INFOS MODIFIEES [BAW]**\n👤 Responsable : ${user}\n📝 Ancien : ${item.nom}\n✅ Nouveau : ${nNom}`);
            setTimeout(() => location.reload(), 500);
        }
    }

    async function sendDiscord(msg) {
        if (!DISCORD_WEBHOOK) return;
        try {
            await fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: msg })
            });
        } catch(e) {}
    }

    function filter(val) {
        const v = val.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.dataset.name.includes(v) ? 'block' : 'none';
        });
    }

    function toggleModal(show) { document.getElementById('modalAdd').style.display = show ? 'flex' : 'none'; }
    window.onload = load;
</script>
</body>
</html>
